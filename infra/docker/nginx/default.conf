# ============================================================
# AgroPulse Nepal - Nginx Configuration for IP-based Access
# Optimized for AWS ECR deployment with direct IP access
# ============================================================

server {
    listen 80;
    server_name _;  # Accept all server names (works with IP or any domain)

    root /usr/share/nginx/html;
    index index.html;

    # Access and error logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # ── Gzip Compression ────────────────────────────────────
    # Reduces bandwidth usage and improves load times
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript 
               text/xml application/xml application/xml+rss text/javascript 
               application/vnd.ms-fontobject application/x-font-ttf 
               font/opentype image/svg+xml image/x-icon;

    # ── Security Headers ────────────────────────────────────
    # Protects against common web vulnerabilities
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Rate Limiting ───────────────────────────────────────
    # Prevents abuse and DDoS attacks
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

    # ── Health Check Endpoint ───────────────────────────────
    # Used by AWS load balancer for health monitoring
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── API Proxy ───────────────────────────────────────────
    # Forward API requests to backend service
    location /api/ {
        limit_req zone=general burst=50 nodelay;
        
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 10m;
    }

    # ── Static Assets Caching ───────────────────────────────
    # Cache static files for better performance
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA Fallback ────────────────────────────────────────
    # All routes serve index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Block Hidden Files ──────────────────────────────────
    # Prevent access to sensitive files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(env|git|htaccess)$ {
        deny all;
    }

    # ── Error Handling ──────────────────────────────────────
    # Custom error responses
    error_page 502 503 504 @fallback;
    location @fallback {
        return 503 '{"error":"Service temporarily unavailable. Please try again later."}';
        add_header Content-Type application/json;
    }

    error_page 404 /index.html;
}
