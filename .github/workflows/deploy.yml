# ============================================================
# GitHub Actions Workflow: Deploy to AWS
# Purpose: Automates the deployment of AgroPulse application
#          to AWS infrastructure using Docker, ECR, and Terraform
# ============================================================

name: Deploy to AWS

# Trigger this workflow when code is pushed to the main branch
on:
  push:
    branches: [ main ]

# Define the deployment job
jobs:
  deploy:
    # Use the latest Ubuntu runner for the build environment
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout the repository code
      # fetch-depth: 0 ensures we get the complete git history
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ensure all files are fetched 

      # Step 2: Configure AWS credentials for authentication
      # Uses temporary credentials from AWS Learner's Lab (rotates every 2 hours)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1
          
      # Step 3: Debug step to verify AWS identity and permissions
      # Confirms that the credentials are working correctly
      - name: Debug AWS Identity
        run: |
          aws sts get-caller-identity
          echo "AWS Account ID: $(aws sts get-caller-identity --query Account --output text)"  

      # Step 4: Debug step to verify file structure before Docker build
      # Helps identify missing files (like nginx config) before build fails
      - name: Debug Files
        run: |
          pwd
          find . -maxdepth 3 -type f -name "*.conf"
          find . -maxdepth 3 -type d -name "nginx"
          ls -la infra/ 2>/dev/null || echo "infra directory not found"
          ls -la infra/nginx/ 2>/dev/null || echo "infra/nginx directory not found"

      # Step 5: Authenticate Docker with Amazon ECR (Elastic Container Registry)
      # This allows us to push Docker images to AWS ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 6: Build and push the API backend Docker image
      # Creates a Docker image for the backend API service
      - name: Build, tag, and push API image to Amazon ECR
        id: build-api
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: agropulse-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f infra/docker/api.Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "api_image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # Step 7: Build and push the Web frontend Docker image
      # Creates a Docker image for the frontend web application with Nginx
      - name: Build, tag, and push Web image to Amazon ECR
        id: build-web
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: agropulse-web
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f infra/docker/web.Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "web_image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # Step 8: Install Terraform on the runner
      # Terraform is used to manage AWS infrastructure as code
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Step 9: Configure Terraform S3 Backend
      # Stores Terraform state file in S3 for remote state management
      # State file will be stored in the specified S3 bucket
      - name: Configure Terraform Backend
        working-directory: ./infra/terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=agropulse/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="encrypt=true"

      # Step 10: Initialize Terraform
      # Downloads required providers
      - name: Terraform Init
        working-directory: ./infra/terraform
        run: terraform init -backend=false

      # Step 11: Validate Terraform configuration
      # Checks for syntax errors and validates the configuration
      - name: Terraform Validate
        working-directory: ./infra/terraform
        run: terraform validate

      # Step 12: Plan Terraform changes
      # Shows what will be created, modified, or destroyed
      - name: Terraform Plan
        working-directory: ./infra/terraform
        run: |
          terraform plan \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="lab_role_arn=${{ secrets.LAB_ROLE_ARN }}" \
            -var="api_image=${{ steps.build-api.outputs.api_image }}" \
            -var="web_image=${{ steps.build-web.outputs.web_image }}"

      # Step 13: Apply Terraform configuration
      # Deploys/updates AWS infrastructure with the new Docker images
      # Passes database password, IAM role ARN, and Docker image URIs as variables
      - name: Terraform Apply
        working-directory: ./infra/terraform
        run: |
          terraform apply -auto-approve \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="lab_role_arn=${{ secrets.LAB_ROLE_ARN }}" \
            -var="api_image=${{ steps.build-api.outputs.api_image }}" \
            -var="web_image=${{ steps.build-web.outputs.web_image }}"
