services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-agropulse}
      - POSTGRES_URL=${POSTGRES_URL:-postgres://postgres:password@db:5432/agropulse}
      - JWT_SECRET=${JWT_SECRET:-supersecret_change_this_in_production}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-*}
    depends_on:
      - db
      - redis
    volumes:
      - api-uploads:/app/apps/api/uploads
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_NAME:-agropulse}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
  api-uploads:
